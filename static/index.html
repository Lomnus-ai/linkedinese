<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkedIn Translator</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">in</span>
      <h1>LinkedIn Translator</h1>
    </div>
    <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle theme">
      <span class="theme-icon-light">☀</span>
      <span class="theme-icon-dark">☾</span>
    </button>
  </header>

  <main class="container">
    <section class="controls">
      <fieldset class="direction">
        <legend>Direction</legend>
        <label>
          <input type="radio" name="direction" value="en_to_linkedin" checked />
          <span>English → LinkedIn Speak</span>
        </label>
        <label>
          <input type="radio" name="direction" value="linkedin_to_en" />
          <span>LinkedIn Speak → English</span>
        </label>
      </fieldset>

      <label class="model-picker">
        <span>Model</span>
        <select id="model"></select>
      </label>
    </section>

    <section class="panes">
      <div class="pane pane-input">
        <div class="pane-header">
          <h2>Input</h2>
          <span id="char-count" class="meta">0 chars</span>
        </div>
        <textarea
          id="input"
          rows="14"
          placeholder="Paste text here…"
          maxlength="10000"
          autofocus
        ></textarea>
      </div>

      <div class="pane pane-output">
        <div class="pane-header">
          <h2>Output</h2>
          <button id="copy-btn" class="text-btn" disabled>Copy</button>
        </div>
        <div id="output" class="output" aria-live="polite"></div>
        <div id="status" class="status" role="status"></div>
      </div>
    </section>

    <button id="translate-btn" class="primary" type="button">Translate</button>
    <p id="error" class="error" role="alert"></p>
  </main>

  <footer class="footnote">
    <span id="rate-limit-note"></span>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
